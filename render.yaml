# Render Blueprint for MarketSense AI
# This file defines the entire infrastructure (Databases, Web Server, Worker, Frontend)
# It allows for a 1-click deployment on Render.com

databases:
  - name: marketsense-db
    plan: free

services:
  # 2. Redis Cache (for Celery Tasks)
  # Deploying Redis as a private Docker service
  - type: pserv
    name: marketsense-redis
    env: docker
    dockerfilePath: ./backend/Dockerfile.redis
    plan: free

  # 3. FastAPI Backend
  - type: web
    name: marketsense-backend
    env: python
    buildCommand: |
      cd backend
      pip install -r requirements.txt
    startCommand: |
      cd backend
      alembic upgrade head || true
      uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketsense-db
          property: connectionString
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_DEFAULT_REGION
        value: us-east-1

  # 3. React Frontend
  - type: web
    name: marketsense-frontend
    env: node
    buildCommand: |
      cd frontend
      npm install
      npm run build
    startCommand: |
      cd frontend
      npm run preview -- --port $PORT --host 0.0.0.0
    envVars:
      - key: VITE_API_URL
        value: "https://marketsense-backend.onrender.com/api/v1"
